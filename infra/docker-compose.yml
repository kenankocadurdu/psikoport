name: psikoport

services:
  postgres:
    image: postgres:16-alpine
    container_name: psikoport-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-psikoport}
    ports:
      - "${DB_PORT:-5432}:5432"
    command: >
      postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
        -c archive_timeout=60
    volumes:
      - postgres:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: psikoport-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: psikoport-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: psikoport-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${S3_BUCKET:-psikoport}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASSWORD &&
        mc mb local/$$MINIO_BUCKET --ignore-existing &&
        mc anonymous set none local/$$MINIO_BUCKET
      "
    restart: "no"
    profiles: [init]

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: psikoport-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  api:
    image: psikoport-api
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: psikoport-api
    env_file:
      - ../.env
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-psikoport}
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: http://api:${PORT:-3001}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-psikoport}
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: psikoport-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: psikoport-worker
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-psikoport}
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: http://api:${PORT:-3001}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-psikoport}
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: psikoport-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: psikoport-frontend
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: psikoport-frontend
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:${PORT:-3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres:
  redis:
  minio:
  wal_archive:
