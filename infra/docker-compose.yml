name: psikoport

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile.postgres
    container_name: psikoport-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-psikoport}
      AWS_ACCESS_KEY_ID: ${MINIO_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    command: >
      postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='. /etc/walg-env.sh && wal-g wal-push %p'
        -c archive_timeout=60
    volumes:
      - postgres:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres/walg-env.sh:/etc/walg-env.sh:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup-cron:
    build:
      context: ./postgres
      dockerfile: Dockerfile.postgres
    container_name: psikoport-backup-cron
    env_file:
      - ../.env
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-psikoport}
      PGDATA: /var/lib/postgresql/data
      AWS_ACCESS_KEY_ID: ${MINIO_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./postgres/backup-cron.sh:/usr/local/bin/backup-cron.sh
      - ./postgres/walg-env.sh:/etc/walg-env.sh:ro
    entrypoint: >
      /bin/sh -c "
        chmod +x /usr/local/bin/backup-cron.sh &&
        echo '0 2 * * * /usr/local/bin/backup-cron.sh >> /var/log/backup-cron.log 2>&1' | crontab - &&
        cron -f
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: psikoport-redis
    build:
      context: .
      dockerfile: Dockerfile.redis
    container_name: psikoport-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: psikoport-minio
    build:
      context: .
      dockerfile: Dockerfile.minio
    container_name: psikoport-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: psikoport-mc
    build:
      context: .
      dockerfile: Dockerfile.mc
    container_name: psikoport-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${S3_BUCKET:-psikoport}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASSWORD &&
        mc mb local/$$MINIO_BUCKET --ignore-existing &&
        mc anonymous set none local/$$MINIO_BUCKET &&
        printf '<?xml version="1.0" encoding="UTF-8"?><CORSConfiguration><CORSRule><AllowedOrigin>*</AllowedOrigin><AllowedMethod>PUT</AllowedMethod><AllowedMethod>GET</AllowedMethod><AllowedMethod>HEAD</AllowedMethod><AllowedHeader>*</AllowedHeader><MaxAgeSeconds>3600</MaxAgeSeconds></CORSRule></CORSConfiguration>' > /tmp/cors.xml &&
        mc cors set local/$$MINIO_BUCKET /tmp/cors.xml || true &&
        mc mb local/psikoport-backups --ignore-existing &&
        mc anonymous set none local/psikoport-backups
      "
    restart: "no"

  jaeger:
    image: psikoport-jaeger
    build:
      context: .
      dockerfile: Dockerfile.jaeger
    container_name: psikoport-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  api:
    image: psikoport-api
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: psikoport-api
    env_file:
      - ../.env
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-psikoport}
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: http://api:${PORT:-3001}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-psikoport}
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: psikoport-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: psikoport-worker
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-psikoport}
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: http://api:${PORT:-3001}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-psikoport}
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: psikoport-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: psikoport-frontend
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: psikoport-frontend
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:${PORT:-3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres:
  redis:
  minio:
  wal_archive:
